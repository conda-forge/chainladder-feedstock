{% set name = "chainladder" %}
{% set version = "0.9.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/chainladder-{{ version }}.tar.gz
  sha256: 4ad774e7bcdbb407c13bcb34364c607c7ff780c0dfa53a31ced8ab4ade81441b

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv


requirements:
  host:
    - pip
    - python >=3.10
    - setuptools
  run:
    - ipython
    - joblib
    - numpy >=1.12.0
    - pandas >=2.0, <3.0
    - python >=3.10
    - scikit-learn >=1.4.2
    - scipy
    - matplotlib
    - numba
    - sparse
    - dill
    - patsy

test:
  imports:
    - chainladder
    - chainladder.core
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/casact/chainladder-python
  summary: Chainladder Package - P&C Loss Reserving package
  license: MPL-2.0
  # License file manually packaged. See https://github.com/casact/chainladder-python/pull/102
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jbogaardt
    - kennethshsu
